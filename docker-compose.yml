services:
  postgres:
    image: postgres:16-alpine
    container_name: desafio-qa-postgres
    environment:
      POSTGRES_USER: desafio
      POSTGRES_PASSWORD: desafio
      POSTGRES_DB: desafio_qa
    # Porta 5433 no host evita conflito com PostgreSQL nativo no Windows (geralmente na 5432).
    ports:
      - "5433:5432"
    volumes:
      - desafio_qa_pgdata:/var/lib/postgresql/data

volumes:
  desafio_qa_pgdata:
